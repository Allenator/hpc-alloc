# Authoritative hpc-alloc v2 configuration (Python 3.11+).
# Copy to ~/.config/hpc-alloc/config.toml, or let `hpc-alloc setup` create it.
#
# Resource precedence:
#   CLI flag > selected [cluster.NAME] > [defaults] > built-in fallback
# Unknown tables and keys are errors.

[identity]
# Required. This identity is used for every configured cluster.
netid = "YOUR_NETID"

[ssh]
# Optional. Pinning a registered key prevents OpenSSH from offering unrelated
# keys until the server's authentication-attempt limit is exhausted. The value
# must be an absolute path or start with ~/ and may not contain whitespace.
identity_file = "~/.ssh/id_ed25519"

[defaults]
# Optional when there is exactly one cluster; required to select a default when
# several clusters are configured.
cluster = "bouchet"

# Optional resource defaults. These are the v2 built-in values shown here.
partition = "day"
gpu_partition = "gpu"
time = "4:00:00"
cpus = 2

# If omitted, Slurm chooses memory according to cluster policy.
# mem = "16G"

# Used only for persistent GPU allocations. Zero disables the watchdog.
idle_timeout = 30

# Every cluster needs an explicit host. Any resource key from [defaults] may be
# repeated here to override it for this cluster.
[cluster.bouchet]
host = "bouchet.ycrc.yale.edu"
# partition = "day"
# gpu_partition = "gpu"
# time = "4:00:00"
# cpus = 2
# mem = "16G"
# idle_timeout = 30

# Partitions to treat as non-dedicated (preemptible or short-lived): they are
# excluded from `-G TYPE:N` GPU auto-selection and flagged in `avail --for`.
# fnmatch globs; defaults to the values below. Settable here or in [defaults];
# override only when a cluster names those pools differently.
# nondedicated_partition_globs = ["scavenge*", "*devel"]

# Additional clusters use the section name as the --cluster value. Names and
# job IDs are convenience selectors; resolve ambiguity with cluster:@operation_id.
#
# [cluster.grace]
# host = "grace.ycrc.yale.edu"
# partition = "day"
